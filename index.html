<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小一數學互動教學</title>
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body { 
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; 
            padding: 20px; 
            max-width: 1000px; 
            margin: auto; 
            background-color: #fdf6e3; 
            min-height: 100vh;
        }

        .box {
            padding: 15px;
            margin: 10px 0;
            border-radius: 15px;
            font-weight: bold;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-box { 
            background: #5d4037; color: #ffffff; 
            font-size: 1.8rem; margin-bottom: 20px;
        }
        
        .category-box { 
            background: #ffe4b5; color: #5d4037; 
            font-size: 1.2rem; width: fit-content; margin: 10px auto; 
            padding: 10px 20px;
        }
        
        ul { 
            list-style-type: none; 
            padding: 0; 
            display: grid; 
            /* 響應式 Grid：大螢幕 4 排，手機自動變成 2 排 */
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 15px; 
        }
        
        .game-link { 
            background: #2e7d32; color: #ffffff; 
            font-size: 1.1rem; 
            transition: transform 0.2s;
            height: 80px;
            cursor: pointer;
        }
        .game-link:hover { transform: scale(1.02); }
        .game-link:active { transform: scale(0.95); }

        a { text-decoration: none; color: inherit; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }

        @media (max-width: 600px) {
            ul { grid-template-columns: repeat(2, 1fr); }
            .game-link { font-size: 0.95rem; height: 70px; }
        }
    </style>
</head>
<body>

    <div class="box header-box">小一數學互動教學</div>
    <div class="box category-box">請選擇下列課程遊戲單元</div>

    <ul id="game-list"></ul>

    <script>
        const version = "1";
        // 依照您的要求，將所有遊戲連結整理進此列表
        const games = [
            { name: "加法遊戲", file: "addition-game-nonios.html" },
            { name: "九九乘法遊戲", file: "timestable-nonios.html" },
            { name: "天國八福注音", file: "zhuyin-nonios.html" },
        ];

        const listElement = document.getElementById('game-list');
        games.forEach(game => {
            const li = document.createElement('li');
            li.innerHTML = `<div class="box game-link"><a href="${game.file}?v=${version}">${game.name}</a></div>`;
            listElement.appendChild(li);
        });
    </script>
</body>
</html>
